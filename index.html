<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cute Pastel Timer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%92%9A%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="timer-card">
      <h1>Cute Timer</h1>
      <div id="timer" class="timer-display">00:00:00:00</div>
      <div class="labels">
        <span>Hours</span>
        <span>Minutes</span>
        <span>Seconds</span>
        <span>Centiseconds</span>
      </div>
      <div class="controls">
        <button id="start" type="button">Start</button>
        <button id="stop" type="button">Pause</button>
        <button id="clear" type="button">Reset</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
